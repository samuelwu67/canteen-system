<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>園遊會點餐系統</title>

<style>
body{
  font-family: Arial;
  font-size:18px;
  padding:15px;
  background:#f5f5f5;
}

h2{text-align:center;}

.box{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-size:18px;
  background:#4CAF50;
  color:white;
}

button.red{background:red;}

select{
  width:100%;
  padding:8px;
  margin:5px 0;
  font-size:16px;
}
</style>
</head>

<body>

<h2>🍦 園遊會點餐系統</h2>

<!-- 角色 -->
<div id="roleBox" class="box">
  <h3>請選擇身分</h3>
  <button id="btnFront">我是外場</button>
  <button id="btnBack">我是內場</button>
</div>

<!-- 外場 -->
<div id="front" class="box" style="display:none;">
  <h3>外場點餐</h3>

  <div id="cart"></div>

  <button id="addBtn">➕ 新增餐點</button>
  <button id="sendBtn">📦 送出訂單</button>
</div>

<!-- 內場 -->
<div id="back" class="box" style="display:none;">
  <h3>內場訂單</h3>
  <div id="orders"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* 🔥 Firebase */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ======================
   🎭 角色切換（穩定版）
====================== */
document.getElementById("btnFront").onclick = () => {
  localStorage.setItem("role","front");
  renderRole();
};

document.getElementById("btnBack").onclick = () => {
  localStorage.setItem("role","back");
  renderRole();
};

function renderRole(){
  const role = localStorage.getItem("role");

  document.getElementById("roleBox").style.display = "none";
  document.getElementById("front").style.display = "none";
  document.getElementById("back").style.display = "none";

  if(!role){
    document.getElementById("roleBox").style.display = "block";
    return;
  }

  if(role === "front") document.getElementById("front").style.display = "block";
  if(role === "back") document.getElementById("back").style.display = "block";
}

/* ======================
   🍽 點餐資料
====================== */
let cart = [];

/* ➕ 新增餐點 */
document.getElementById("addBtn").onclick = () => {

  const id = Date.now();

  const box = document.createElement("div");
  box.className = "box";
  box.dataset.id = id;

  box.innerHTML = `
    類別：
    <select class="type">
      <option value="">請選</option>
      <option value="ice">冰淇淋</option>
      <option value="taiyaki">鯛魚燒</option>
      <option value="waffle">鬆餅</option>
    </select>

    <div class="sub"></div>

    <button class="remove red">❌ 取消</button>
  `;

  document.getElementById("cart").appendChild(box);

  cart.push({id});

  /* 類別 */
  box.querySelector(".type").onchange = (e)=>{
    renderItem(id, e.target.value, box);
  };

  /* 刪除 */
  box.querySelector(".remove").onclick = ()=>{
    box.remove();
    cart = cart.filter(c => c.id !== id);
  };
};

/* 🍽 內容 */
function renderItem(id, type, box){

  let html = "";

  if(type === "ice"){
    html = `
      冰淇淋：
      <select class="item">
        <option>原味</option>
        <option>巧克力</option>
        <option>草莓</option>
      </select>

      配料：
      <select class="top">
        <option>無</option>
        <option>巧克力脆片</option>
        <option>棉花糖</option>
      </select>

      份數：
      <select class="qty">
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>
    `;
  }

  if(type === "taiyaki"){
    html = `
      鯛魚燒：
      <select class="item">
        <option>巧克力</option>
        <option>卡士達</option>
      </select>

      份數：
      <select class="qty">
        <option>1</option>
        <option>2</option>
      </select>
    `;
  }

  if(type === "waffle"){
    html = `
      鬆餅：
      <select class="item">
        <option>巧克力醬</option>
        <option>不淋</option>
      </select>

      份數：
      <select class="qty">
        <option>1</option>
        <option>2</option>
      </select>
    `;
  }

  box.querySelector(".sub").innerHTML = html;
}

/* ======================
   📦 送出（穩定版）
====================== */
document.getElementById("sendBtn").onclick = () => {

  const now = new Date();
  const time =
    now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "+
    now.getHours()+":"+now.getMinutes()+":"+now.getSeconds();

  let order = [];

  document.querySelectorAll("#cart .box").forEach(box=>{

    const type = box.querySelector(".type").value;
    const sub = box.querySelector(".sub");

    if(!type || !sub.innerHTML) return;

    order.push({
      type,
      item: box.querySelector(".item")?.value || "",
      top: box.querySelector(".top")?.value || "",
      qty: box.querySelector(".qty")?.value || "1"
    });
  });

  if(order.length === 0){
    alert("請先點餐");
    return;
  }

  db.ref("orders").push({
    items: order,
    time,
    done:false
  });

  document.getElementById("cart").innerHTML = "";
  cart = [];

  alert("已送出！");
};

/* ======================
   📡 內場
====================== */
db.ref("orders").on("value", snap=>{

  const data = snap.val() || {};
  let html = "";

  for(let id in data){

    const o = data[id];

    let list = "";
    o.items.forEach(i=>{
      list += `${i.type} ${i.item} x${i.qty}<br>`;
    });

    html += `
      <div class="box">
        ⏰ ${o.time}<br>
        ${list}

        <button onclick="done('${id}')">
          ${o.done ? "✔完成" : "完成"}
        </button>

        <button class="red" onclick="del('${id}')">
          刪除
        </button>
      </div>
    `;
  }

  document.getElementById("orders").innerHTML = html;
});

function done(id){
  db.ref("orders/"+id).update({done:true});
}

function del(id){
  db.ref("orders/"+id).remove();
}

/* 初始化 */
renderRole();

</script>

</body>
</html>
