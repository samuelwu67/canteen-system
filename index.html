<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>園遊會點餐系統 - 最終整合修正版</title>

<style>
  body { font-family: Arial, "Microsoft JhengHei"; background: #f0f2f5; padding: 15px; margin: 0; font-size: 18px; }
  h2 { text-align: center; color: #2c3e50; }
  .box { background: white; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  
  /* 內場訂單狀態 */
  .order-done { background: #e8f5e9 !important; border-left: 8px solid #4CAF50; opacity: 0.7; }
  .order-wait { border-left: 8px solid #ff9800; }
  .order-urgent { border-left: 8px solid #e74c3c; background: #fff5f5; }

  button { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; color: white; background: #4CAF50; }
  button:active { transform: scale(0.95); }
  button.blue { background: #2196F3; }
  button.red { background: #e74c3c; }
  button.gray { background: #95a5a6; font-size: 14px; width: auto; padding: 5px 15px; }

  select, input { width: 100%; padding: 10px; margin: 5px 0 15px 0; font-size: 18px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
  .item-row { border-bottom: 1px dashed #eee; padding: 8px 0; font-size: 16px; line-height: 1.5; }
  .wait-text { color: #e74c3c; font-weight: bold; font-size: 14px; }
</style>
</head>

<body>

<h2>🍦 園遊會點餐系統</h2>

<!-- 🎭 角色切換 -->
<div id="roleBox" class="box">
  <h3>請選擇身分</h3>
  <button onclick="setRole('front')">我是外場 (點餐)</button>
  <button onclick="setRole('back')" class="blue">我是內場 (出餐)</button>
</div>

<!-- 🛒 外場介面 -->
<div id="front" style="display:none;" class="box">
  <div style="display:flex; justify-content: space-between; align-items: center;">
    <h3>外場點餐</h3>
    <button class="gray" onclick="setRole('')">切換身分</button>
  </div>

  👤 指名：
  <input type="text" id="c_name" placeholder="例如：小明 / 3號桌">

  🍦 冰淇淋：
  <select id="c_ice">
    <option value="無">無</option><option value="原味">原味</option><option value="巧克力">巧克力</option><option value="草莓">草莓</option>
  </select>
  份數：
  <select id="c_iceQty">
    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
  </select>

  🍫 配料：
  <select id="c_top">
    <option value="無">無</option><option value="巧克力脆片">巧克力脆片</option><option value="棉花糖">棉花糖</option>
  </select>

  🐟 鯛魚燒：
  <select id="c_tai">
    <option value="無">無</option><option value="巧克力">巧克力</option><option value="卡士達">卡士達</option>
  </select>
  份數：
  <select id="c_taiQty">
    <option value="0">0</option><option value="1">1</option><option value="2">2</option>
  </select>

  <button onclick="sendOrder()" class="blue" id="btnSend">📦 送出訂單</button>
</div>

<!-- 👨‍🍳 內場介面 -->
<div id="back" style="display:none;" class="box">
  <div style="display:flex; justify-content: space-between; align-items: center;">
    <h3>📋 內場訂單清單</h3>
    <button class="gray" onclick="setRole('')">切換身分</button>
  </div>
  <div id="orders">正在載入訂單...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDU5jL0jVeOQI2ixqaYeOO7vEstHiXhv_I",
    authDomain: "canteen-system-41c48.firebaseapp.com",
    databaseURL: "https://canteen-system-41c48-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "canteen-system-41c48",
    storageBucket: "canteen-system-41c48.firebasestorage.app",
    messagingSenderId: "135011225815",
    appId: "1:135011225815:web:44804a05a0ca4d8922a092"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function setRole(r){
  if(!r) localStorage.removeItem("role");
  else localStorage.setItem("role", r);
  showUI();
}

function showUI(){
  const r = localStorage.getItem("role");
  document.getElementById("roleBox").style.display = r ? "none" : "block";
  document.getElementById("front").style.display = r === "front" ? "block" : "none";
  document.getElementById("back").style.display = r === "back" ? "block" : "none";
}

function sendOrder(){
  const btn = document.getElementById("btnSend");
  const nameVal = document.getElementById("c_name").value || "未填";
  
  btn.disabled = true;
  btn.innerText = "傳送中...";

  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  db.ref("orders").push({
    name: nameVal,
    ice: document.getElementById("c_ice").value,
    iceQty: document.getElementById("c_iceQty").value,
    top: document.getElementById("c_top").value,
    tai: document.getElementById("c_tai").value,
    taiQty: document.getElementById("c_taiQty").value,
    time: timeStr,
    timestamp: Date.now(),
    done: false
  }).then(() => {
    alert("✅ 訂單 #" + nameVal + " 已送出");
    document.getElementById("c_name").value = "";
    btn.disabled = false;
    btn.innerText = "📦 送出訂單";
  }).catch(e => {
    alert("錯誤：" + e.message);
    btn.disabled = false;
    btn.innerText = "📦 送出訂單";
  });
}

// 內場監聽
db.ref("orders").on("value", snap => {
  const data = snap.val() || {};
  let html = "";
  const now = Date.now();

  const sortedKeys = Object.keys(data).sort((a,b) => {
    if(data[a].done === data[b].done) return data[a].timestamp - data[b].timestamp;
    return data[a].done ? 1 : -1;
  });

  sortedKeys.forEach(id => {
    const o = data[id];
    const waitMin = Math.floor((now - o.timestamp) / 60000);
    const statusClass = o.done ? "order-done" : (waitMin >= 10 ? "order-urgent" : "order-wait");

    // 格式化顯示內容 (避免顯示數量為 0 的項目)
    let iceInfo = (o.iceQty > 0) ? `🍦 ${o.ice} x ${o.iceQty} (${o.top})` : "";
    let taiInfo = (o.taiQty > 0) ? `🐟 ${o.tai} x ${o.taiQty}` : "";
    
    html += `
      <div class="box ${statusClass}">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <b>👤 ${o.name}</b>
          <span class="wait-text">${o.done ? "已完成" : "等待 " + waitMin + " 分鐘"}</span>
        </div>
        <div class="item-row">
          ${iceInfo} ${iceInfo && taiInfo ? "<br>" : ""}
          ${taiInfo}
          ${!iceInfo && !taiInfo ? "⚠️ 未點購任何餐點" : ""}
        </div>
        <div style="font-size:12px; color:#888; margin-top:5px;">🕒 下單時間：${o.time}</div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button onclick="toggleDone('${id}', ${o.done})" style="background:${o.done ? '#95a5a6' : '#4CAF50'}; padding:8px;">
            ${o.done ? "恢復為未完成" : "✅ 點擊完成"}
          </button>
          <button onclick="del('${id}')" class="red" style="width:100px; padding:8px;">🗑️ 刪除</button>
        </div>
      </div>
    `;
  });
  document.getElementById("orders").innerHTML = html || "<p style='text-align:center;'>☕ 目前沒有訂單</p>";
});

function toggleDone(id, cur){
  db.ref("orders/"+id).update({ done: !cur });
}

function del(id){
  if(confirm("⚠ 注意：確定要【徹底刪除】這筆訂單嗎？\n刪除後資料將無法找回。")){
    db.ref("orders/"+id).remove();
  }
}

showUI();
</script>
</body>
</html>
