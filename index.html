<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>園遊會點餐系統</title>

<style>
body{
  font-family: "Microsoft JhengHei", Arial;
  font-size:18px;
  padding:15px;
  background:#f5f5f5;
}

h2{text-align:center;}

.box{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.order-item {
  border-bottom: 1px dashed #ccc;
  padding: 5px 0;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-size:18px;
  background:#4CAF50;
  color:white;
  cursor: pointer;
}

button.red{background:#e74c3c;}
button.gray{background:#95a5a6;}

select{
  width:100%;
  padding:10px;
  margin:5px 0;
  font-size:16px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>🍦 園遊會點餐系統</h2>

<!-- 角色選擇 -->
<div id="roleBox" class="box">
  <h3>請選擇身分</h3>
  <button id="btnFront">我是外場 (點餐)</button>
  <button id="btnBack">我是內場 (出餐)</button>
</div>

<!-- 外場介面 -->
<div id="front" class="box" style="display:none;">
  <div style="display:flex; justify-content: space-between; align-items: center;">
      <h3>外場點餐</h3>
      <button class="gray" style="width:80px; font-size:14px;" onclick="resetRole()">登出</button>
  </div>
  <div id="cart"></div>
  <button id="addBtn">➕ 新增餐點</button>
  <button id="sendBtn" style="background:#2196F3;">📦 送出訂單</button>
</div>

<!-- 內場介面 -->
<div id="back" class="box" style="display:none;">
  <div style="display:flex; justify-content: space-between; align-items: center;">
      <h3>內場訂單清單</h3>
      <button class="gray" style="width:80px; font-size:14px;" onclick="resetRole()">登出</button>
  </div>
  <div id="orders"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
/* 🔥 Firebase 設定 (請務必填寫你的資料) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 中文對照表 */
const typeMap = {
    ice: "冰淇淋",
    taiyaki: "鯛魚燒",
    waffle: "鬆餅"
};

/* ======================
    🎭 角色切換
====================== */
document.getElementById("btnFront").onclick = () => {
  localStorage.setItem("role","front");
  renderRole();
};

document.getElementById("btnBack").onclick = () => {
  localStorage.setItem("role","back");
  renderRole();
};

window.resetRole = () => {
    localStorage.removeItem("role");
    renderRole();
};

function renderRole(){
  const role = localStorage.getItem("role");
  document.getElementById("roleBox").style.display = role ? "none" : "block";
  document.getElementById("front").style.display = role === "front" ? "block" : "none";
  document.getElementById("back").style.display = role === "back" ? "block" : "none";
}

/* ======================
    🍽 外場功能
====================== */
document.getElementById("addBtn").onclick = () => {
  const id = Date.now();
  const box = document.createElement("div");
  box.className = "box item-row";
  box.dataset.id = id;

  box.innerHTML = `
    <strong>類別：</strong>
    <select class="type">
      <option value="">請選擇餐點...</option>
      <option value="ice">冰淇淋</option>
      <option value="taiyaki">鯛魚燒</option>
      <option value="waffle">鬆餅</option>
    </select>
    <div class="sub"></div>
    <button class="remove red">❌ 取消此項</button>
  `;

  document.getElementById("cart").appendChild(box);

  box.querySelector(".type").onchange = (e)=>{
    renderItemOptions(e.target.value, box.querySelector(".sub"));
  };

  box.querySelector(".remove").onclick = ()=>{
    box.remove();
  };
};

function renderItemOptions(type, container){
  let html = "";
  if(type === "ice"){
    html = `
      口味：<select class="item"><option>原味</option><option>巧克力</option><option>草莓</option></select>
      配料：<select class="top"><option>無</option><option>巧克力脆片</option><option>棉花糖</option></select>
      份數：<select class="qty"><option>1</option><option>2</option><option>3</option></select>`;
  } else if(type === "taiyaki"){
    html = `
      口味：<select class="item"><option>巧克力</option><option>卡士達</option></select>
      份數：<select class="qty"><option>1</option><option>2</option></select>`;
  } else if(type === "waffle"){
    html = `
      口味：<select class="item"><option>巧克力醬</option><option>不淋</option></select>
      份數：<select class="qty"><option>1</option><option>2</option></select>`;
  }
  container.innerHTML = html;
}

document.getElementById("sendBtn").onclick = () => {
  let orderItems = [];
  document.querySelectorAll("#cart .item-row").forEach(box => {
    const type = box.querySelector(".type").value;
    if(!type) return;

    orderItems.push({
      typeName: typeMap[type],
      item: box.querySelector(".item")?.value || "",
      top: box.querySelector(".top")?.value || "",
      qty: box.querySelector(".qty")?.value || "1"
    });
  });

  if(orderItems.length === 0){
    alert("請先增加餐點內容");
    return;
  }

  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

  db.ref("orders").push({
    items: orderItems,
    time: timeStr,
    done: false
  }).then(() => {
      document.getElementById("cart").innerHTML = "";
      alert("訂單已送往內場！");
  });
};

/* ======================
    📡 內場監聽
====================== */
db.ref("orders").on("value", snap=>{
  const data = snap.val() || {};
  let html = "";
  
  // 將資料轉為陣列以便處理排序（未完成的在前）
  const sortedKeys = Object.keys(data).reverse(); 

  sortedKeys.forEach(id => {
    const o = data[id];
    let listHtml = "";
    o.items.forEach(i => {
      listHtml += `<div class="order-item">🔹 ${i.typeName}-${i.item} ${i.top!=='無'&&i.top!==''?'('+i.top+')':''} <b>x${i.qty}</b></div>`;
    });

    html += `
      <div class="box" style="${o.done ? 'opacity:0.6; border-left:10px solid #ccc;' : 'border-left:10px solid #4CAF50;'}">
        <div style="color:#666; font-size:14px;">時間：${o.time}</div>
        ${listHtml}
        <div style="display:flex; gap:10px;">
            <button onclick="markDone('${id}', ${o.done})">
              ${o.done ? "✔ 已完成 (點擊取消)" : "✅ 完成餐點"}
            </button>
            <button class="red" style="width:100px;" onclick="deleteOrder('${id}')">刪除</button>
        </div>
      </div>
    `;
  });
  document.getElementById("orders").innerHTML = html || "<p style='text-align:center;'>目前沒有訂單</p>";
});

// 修正：將函式掛載到 window 確保 HTML onclick 能觸發
window.markDone = (id, currentStatus) => {
  db.ref("orders/"+id).update({done: !currentStatus});
};

window.deleteOrder = (id) => {
  if(confirm("確定要刪除這筆訂單嗎？")) {
    db.ref("orders/"+id).remove();
  }
};

/* 初始化 */
renderRole();

</script>
</body>
</html>
