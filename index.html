<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>園遊會點餐系統</title>

<style>
body{
  font-family: Arial;
  padding: 15px;
  font-size: 18px;
  background:#f5f5f5;
}

h2{text-align:center;}

.box{
  background:white;
  border:1px solid #ddd;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

button{
  padding:10px;
  margin:5px;
  width:100%;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
}

button:active{transform:scale(0.98);}

select{
  width:100%;
  padding:8px;
  margin:5px 0;
  font-size:16px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  font-size:16px;
}
</style>

</head>

<body>

<h2>🍦 園遊會點餐系統</h2>

<!-- ====================== -->
<!-- 🎭 選身分 -->
<!-- ====================== -->
<div id="choose" class="box">
  <h3>請選擇身分</h3>
  <button onclick="setRole('front')">我是外場</button>
  <button onclick="setRole('back')">我是內場</button>
</div>

<!-- ====================== -->
<!-- 🍦 外場 -->
<!-- ====================== -->
<div id="front" style="display:none;" class="box">

<h3>外場點餐</h3>

<div id="cart"></div>

<button onclick="addItem()">➕ 新增餐點</button>
<button onclick="sendOrder()">📦 送出訂單</button>

</div>

<!-- ====================== -->
<!-- 📋 內場 -->
<!-- ====================== -->
<div id="back" style="display:none;" class="box">

<h3>內場訂單</h3>
<div id="orders"></div>

</div>

<!-- ====================== -->
<!-- 🔥 Firebase -->
<!-- ====================== -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let items = [];


// ======================
// 🎭 角色系統
// ======================
function setRole(role){
  localStorage.setItem("role", role);
  show();
}

function show(){
  const role = localStorage.getItem("role");

  document.getElementById("choose").style.display = "none";
  document.getElementById("front").style.display = "none";
  document.getElementById("back").style.display = "none";

  if(!role){
    document.getElementById("choose").style.display = "block";
    return;
  }

  if(role === "front"){
    document.getElementById("front").style.display = "block";
  }

  if(role === "back"){
    document.getElementById("back").style.display = "block";
  }
}


// ======================
// ➕ 新增餐點
// ======================
function addItem(){

  const id = Date.now();

  const html = `
  <div class="box" id="item-${id}">

    類別：
    <select onchange="updateType(${id}, this.value)">
      <option value="">請選</option>
      <option value="ice">冰淇淋</option>
      <option value="taiyaki">鯛魚燒</option>
      <option value="waffle">鬆餅</option>
    </select>

    <div id="sub-${id}"></div>

  </div>
  `;

  document.getElementById("cart").innerHTML += html;

  items.push(id);
}


// ======================
// 🍽 類別切換（冰淇淋才有配料）
// ======================
function updateType(id, type){

  let html = "";

  if(type === "ice"){
    html = `
      冰淇淋：
      <select id="ice-${id}">
        <option>原味</option>
        <option>巧克力</option>
        <option>草莓</option>
      </select>

      配料：
      <select id="top-${id}">
        <option>無</option>
        <option>巧克力脆片</option>
        <option>棉花糖</option>
      </select>

      份數：
      <select id="qty-${id}">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    `;
  }

  if(type === "taiyaki"){
    html = `
      鯛魚燒：
      <select id="food-${id}">
        <option>巧克力</option>
        <option>卡士達</option>
      </select>

      份數：
      <select id="qty-${id}">
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    `;
  }

  if(type === "waffle"){
    html = `
      鬆餅：
      <select id="food-${id}">
        <option>淋巧克力醬</option>
        <option>不淋巧克力醬</option>
      </select>

      份數：
      <select id="qty-${id}">
        <option value="1">1</option>
        <option value="2">2</option>
      </select>
    `;
  }

  document.getElementById("sub-"+id).innerHTML = html;
}


// ======================
// 📦 送出訂單
// ======================
function sendOrder(){

  const now = new Date();

  const time =
    now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "+
    now.getHours()+":"+now.getMinutes()+":"+now.getSeconds();

  let order = [];

  items.forEach(id => {

    const sub = document.getElementById("sub-"+id);
    if(!sub) return;

    if(sub.innerHTML.includes("冰淇淋")){
      order.push({
        type:"冰淇淋",
        item: document.getElementById("ice-"+id).value,
        topping: document.getElementById("top-"+id).value,
        qty: document.getElementById("qty-"+id).value
      });
    }

    if(sub.innerHTML.includes("鯛魚燒")){
      order.push({
        type:"鯛魚燒",
        item: document.getElementById("food-"+id).value,
        qty: document.getElementById("qty-"+id).value
      });
    }

    if(sub.innerHTML.includes("鬆餅")){
      order.push({
        type:"鬆餅",
        item: document.getElementById("food-"+id).value,
        qty: document.getElementById("qty-"+id).value
      });
    }

  });

  db.ref("orders").push({
    items: order,
    time: time,
    done: false
  });

  alert("已送出訂單！");

  document.getElementById("cart").innerHTML = "";
  items = [];
}


// ======================
// 📡 內場
// ======================
db.ref("orders").on("value", snap => {

  const data = snap.val() || {};
  let html = "";

  for(let id in data){

    const o = data[id];

    let list = "";
    o.items.forEach(i=>{
      list += `${i.type} ${i.item} x${i.qty}<br>`;
    });

    html += `
      <div class="box">
        ⏰ ${o.time}<br>
        ${list}

        <button onclick="done('${id}')">
          ${o.done ? "✔完成" : "完成"}
        </button>

        <button onclick="del('${id}')" style="background:red;">
          刪除
        </button>
      </div>
    `;
  }

  document.getElementById("orders").innerHTML = html;
});


// ✔ 完成
function done(id){
  db.ref("orders/"+id).update({done:true});
}

// 🗑 刪除
function del(id){
  if(confirm("刪除？")){
    db.ref("orders/"+id).remove();
  }
}


// 🚀 初始化
show();

</script>

</body>
</html>
