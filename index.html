<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>園遊會點餐系統</title>
<style>
  body { font-family: Arial, "Microsoft JhengHei"; background: #f7f7f7; padding: 15px; font-size: 18px; }
  .box { background: white; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 12px; }
  button { font-size: 18px; padding: 10px; width: 100%; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; }
  .btn-done { background: #4CAF50; }
  .btn-undo { background: #95a5a6; }
  .btn-del { background: #e74c3c; margin-top: 5px; }
  .order-item { border-bottom: 1px dashed #ccc; padding: 10px 0; }
  .finished { opacity: 0.6; background: #eee !important; }
</style>
</head>
<body>

<div id="roleChoose" class="box">
  <h2>🍦 園遊會點餐系統</h2>
  <button onclick="setRole('front')" style="background:#2196F3;">我是外場 (點餐)</button>
  <button onclick="setRole('back')" style="background:#4CAF50;">我是內場 (出餐)</button>
</div>

<!-- 外場 -->
<div id="front" style="display:none;" class="box">
  <h3>外場點餐</h3>
  👤 指名：<input type="text" id="name" style="width:90%; padding:8px; margin-bottom:10px;">
  <br>
  🍦 冰淇淋：
  <select id="ice"><option>無</option><option>原味</option><option>巧克力</option></select>
  數量：<select id="iceQty"><option>0</option><option>1</option><option>2</option></select>
  <br>
  🐟 鯛魚燒：
  <select id="tai"><option>無</option><option>巧克力</option><option>卡士達</option></select>
  數量：<select id="taiQty"><option>0</option><option>1</option><option>2</option></select>
  <button onclick="sendOrder()" style="background:#2196F3;">📦 送出訂單</button>
  <button onclick="setRole('')" style="background:gray;">切換身分</button>
</div>

<!-- 內場 -->
<div id="back" style="display:none;" class="box">
  <h3>📋 內場訂單清單</h3>
  <div id="orders">讀取中...</div>
  <button onclick="setRole('')" style="background:gray;">切換身分</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDU5jL0jVeOQI2ixqaYeOO7vEstHiXhv_I",
    authDomain: "canteen-system-41c48.firebaseapp.com",
    databaseURL: "https://canteen-system-41c48-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "canteen-system-41c48"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function setRole(r){
  localStorage.setItem("role", r);
  location.reload(); 
}

const role = localStorage.getItem("role");
if(role){
  document.getElementById("roleChoose").style.display = "none";
  document.getElementById(role).style.display = "block";
}

// 送出訂單
function sendOrder(){
  const orderData = {
    name: document.getElementById("name").value || "未填",
    ice: document.getElementById("ice").value,
    iceQty: document.getElementById("iceQty").value,
    tai: document.getElementById("tai").value,
    taiQty: document.getElementById("taiQty").value,
    time: new Date().toLocaleTimeString(),
    timestamp: Date.now(),
    done: false
  };

  db.ref("orders").push(orderData).then(() => {
    alert("訂單已送出！");
    document.getElementById("name").value = "";
  });
}

// 內場即時顯示
if(role === 'back'){
  db.ref("orders").on("value", snap => {
    const data = snap.val() || {};
    let html = "";
    
    // 依時間排序
    const keys = Object.keys(data).sort((a,b) => data[a].timestamp - data[b].timestamp);

    keys.forEach(id => {
      const o = data[id];
      // 檢查數據是否存在，防止 undefined
      const iceStr = (o.ice && o.ice !== "無") ? `🍦 ${o.ice} x ${o.iceQty}` : "";
      const taiStr = (o.tai && o.tai !== "無") ? `🐟 ${o.tai} x ${o.taiQty}` : "";

      html += `
        <div class="box ${o.done ? 'finished' : ''}">
          <b>👤 ${o.name}</b> <small>(${o.time})</small><br>
          <div style="margin: 10px 0;">
            ${iceStr} ${iceStr && taiStr ? '<br>' : ''} ${taiStr}
          </div>
          <button class="${o.done ? 'btn-undo' : 'btn-done'}" onclick="toggleDone('${id}', ${o.done})">
            ${o.done ? "恢復未完成" : "✅ 點擊完成"}
          </button>
          <!-- 真的刪除按鈕 -->
          <button class="btn-del" onclick="realDelete('${id}')">🗑️ 徹底刪除訂單</button>
        </div>
      `;
    });
    document.getElementById("orders").innerHTML = html || "目前沒有訂單";
  });
}

// 功能：完成/恢復
function toggleDone(id, currentStatus){
  db.ref("orders/" + id).update({ done: !currentStatus });
}

// 功能：真的刪除 (會從 Firebase 移除)
function realDelete(id){
  if(confirm("確定要【徹底刪除】這筆訂單嗎？刪除後無法恢復喔！")){
    db.ref("orders/" + id).remove()
      .then(() => alert("訂單已從資料庫移除"))
      .catch(err => alert("刪除失敗：" + err.message));
  }
}
</script>
</body>
</html>
