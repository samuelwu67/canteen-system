<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>園遊會點餐系統</title>

<style>
body { font-family: Arial; padding: 20px; }
.box { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
button { margin: 5px; padding: 8px; }
select { margin-right: 10px; }
</style>

</head>

<body>

<h2>園遊會點餐系統</h2>

<!-- 選身分 -->
<div id="choose" class="box">
  <h3>請選擇身分</h3>
  <button onclick="setRole('front')">我是外場</button>
  <button onclick="setRole('back')">我是內場</button>
</div>

<!-- 外場 -->
<div id="front" style="display:none;" class="box">
<h3>外場點餐</h3>

<!-- 冰淇淋 -->
冰淇淋：
<select id="ice">
  <option>無</option>
  <option>原味</option>
  <option>巧克力</option>
  <option>草莓</option>
</select>

份數：
<select id="iceQty">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>

<br><br>

<!-- 配料 -->
配料：
<select id="topping">
  <option>無</option>
  <option>巧克力脆片</option>
  <option>巧克力脆笛酥</option>
  <option>棉花糖</option>
</select>

份數：
<select id="toppingQty">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
</select>

<br><br>

<!-- 鯛魚燒 -->
鯛魚燒：
<select id="taiyaki">
  <option>無</option>
  <option>巧克力</option>
  <option>卡士達</option>
</select>

份數：
<select id="taiyakiQty">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
</select>

<br><br>

<!-- 鬆餅 -->
鬆餅：
<select id="waffle">
  <option>無</option>
  <option>淋巧克力醬</option>
  <option>不淋巧克力醬</option>
</select>

份數：
<select id="waffleQty">
  <option value="0">0</option>
  <option value="1">1</option>
  <option value="2">2</option>
</select>

<br><br>

<button onclick="sendOrder()">送出訂單</button>
</div>

<!-- 內場 -->
<div id="back" style="display:none;" class="box">
<h3>內場訂單</h3>
<div id="orders"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// ======================
// 🔥 Firebase（請換成你的）
// ======================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// ======================
// 🎭 角色系統
// ======================
function setRole(role){
  localStorage.setItem("role", role);
  show();
}

function show(){
  const role = localStorage.getItem("role");

  document.getElementById("choose").style.display = "none";
  document.getElementById("front").style.display = "none";
  document.getElementById("back").style.display = "none";

  if(!role){
    document.getElementById("choose").style.display = "block";
    return;
  }

  if(role === "front"){
    document.getElementById("front").style.display = "block";
  }

  if(role === "back"){
    document.getElementById("back").style.display = "block";
  }
}


// ======================
// 🧾 送出訂單
// ======================
function sendOrder(){

  const now = new Date();

  const time =
    now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "+
    now.getHours()+":"+now.getMinutes()+":"+now.getSeconds();

  db.ref("orders").once("value", snap => {

    const count = snap.numChildren() + 1;

    db.ref("orders").push({
      orderNo: count,

      ice: ice.value,
      iceQty: iceQty.value,

      topping: topping.value,
      toppingQty: toppingQty.value,

      taiyaki: taiyaki.value,
      taiyakiQty: taiyakiQty.value,

      waffle: waffle.value,
      waffleQty: waffleQty.value,

      time: time,
      done: false
    });

    alert("已送出訂單 #" + count);
  });
}


// ======================
// 📡 即時訂單（防炸）
// ======================
db.ref("orders").on("value", snap => {

  const data = snap.val() || {};
  let html = "";

  for(let id in data){
    const o = data[id];

    html += `
      <div>
        <b>📦 #${o.orderNo}</b><br>
        ⏰ ${o.time}<br>

        🍦 ${o.ice} x ${o.iceQty}<br>
        🍫 配料：${o.topping} x ${o.toppingQty}<br>
        🐟 ${o.taiyaki} x ${o.taiyakiQty}<br>
        🧇 ${o.waffle} x ${o.waffleQty}<br>

        <button onclick="done('${id}')">
          ${o.done ? "✔已完成" : "完成"}
        </button>

        <button onclick="del('${id}')" style="color:red;">
          刪除
        </button>

        <hr>
      </div>
    `;
  }

  document.getElementById("orders").innerHTML = html;
});


// ======================
// ✔ 完成
// ======================
function done(id){
  db.ref("orders/"+id).update({done:true});
}


// ======================
// 🗑 刪除
// ======================
function del(id){
  if(confirm("確定刪除？")){
    db.ref("orders/"+id).remove();
  }
}


// ======================
// 🚀 初始化
// ======================
show();

</script>

</body>
</html>
