<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>園遊會點餐系統</title>

<style>
body{
  font-family: Arial;
  padding: 15px;
  font-size: 18px;
  background:#f5f5f5;
}

h2{text-align:center;}

.box{
  background:white;
  border:1px solid #ddd;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

button{
  padding:12px;
  margin:5px 0;
  width:100%;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
}

button.red{background:red;}

select{
  width:100%;
  padding:8px;
  margin:5px 0;
  font-size:16px;
}
</style>

</head>

<body>

<h2>🍦 園遊會點餐系統</h2>

<!-- ====================== -->
<!-- 🎭 選身分 -->
<!-- ====================== -->
<div id="choose" class="box">
  <h3>請選擇身分</h3>
  <button id="btnFront">我是外場</button>
  <button id="btnBack">我是內場</button>
</div>

<!-- ====================== -->
<!-- 外場 -->
<!-- ====================== -->
<div id="front" class="box" style="display:none;">
<h3>外場點餐</h3>

<div id="cart"></div>

<button id="addBtn">➕ 新增餐點</button>
<button id="sendBtn">📦 送出訂單</button>

</div>

<!-- ====================== -->
<!-- 內場 -->
<!-- ====================== -->
<div id="back" class="box" style="display:none;">
<h3>內場訂單</h3>
<div id="orders"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 Firebase（換你的）
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let items = [];


// ======================
// 🎭 角色（用 addEventListener）
// ======================
document.getElementById("btnFront").addEventListener("click", ()=>{
  localStorage.setItem("role","front");
  show();
});

document.getElementById("btnBack").addEventListener("click", ()=>{
  localStorage.setItem("role","back");
  show();
});


// ======================
// 🚀 顯示控制
// ======================
function show(){

  const role = localStorage.getItem("role");

  document.getElementById("choose").style.display = "none";
  document.getElementById("front").style.display = "none";
  document.getElementById("back").style.display = "none";

  if(!role){
    document.getElementById("choose").style.display = "block";
    return;
  }

  if(role === "front") document.getElementById("front").style.display = "block";
  if(role === "back") document.getElementById("back").style.display = "block";
}


// ======================
// ➕ 新增餐點（事件綁定）
// ======================
document.getElementById("addBtn").addEventListener("click", addItem);

function addItem(){

  const id = Date.now();

  items.push({id});

  const div = document.createElement("div");
  div.className = "box";
  div.id = "item-"+id;

  div.innerHTML = `
    類別：
    <select class="type">
      <option value="">請選</option>
      <option value="ice">冰淇淋</option>
      <option value="taiyaki">鯛魚燒</option>
      <option value="waffle">鬆餅</option>
    </select>

    <div class="sub"></div>

    <button class="remove red">❌ 取消餐點</button>
  `;

  document.getElementById("cart").appendChild(div);

  // 類別變動
  div.querySelector(".type").addEventListener("change", function(){
    updateType(id, this.value, div);
  });

  // 刪除
  div.querySelector(".remove").addEventListener("click", function(){
    div.remove();
    items = items.filter(i => i.id !== id);
  });
}


// ======================
// 🍽 類別內容
// ======================
function updateType(id, type, div){

  let html = "";

  if(type === "ice"){
    html = `
      冰淇淋：
      <select class="ice">
        <option>原味</option>
        <option>巧克力</option>
        <option>草莓</option>
      </select>

      配料：
      <select class="top">
        <option>無</option>
        <option>巧克力脆片</option>
        <option>棉花糖</option>
      </select>

      份數：
      <select class="qty">
        <option>1</option>
        <option>2</option>
        <option>3</option>
      </select>
    `;
  }

  if(type === "taiyaki"){
    html = `
      鯛魚燒：
      <select class="food">
        <option>巧克力</option>
        <option>卡士達</option>
      </select>

      份數：
      <select class="qty">
        <option>1</option>
        <option>2</option>
      </select>
    `;
  }

  if(type === "waffle"){
    html = `
      鬆餅：
      <select class="food">
        <option>淋巧克力醬</option>
        <option>不淋</option>
      </select>

      份數：
      <select class="qty">
        <option>1</option>
        <option>2</option>
      </select>
    `;
  }

  div.querySelector(".sub").innerHTML = html;
}


// ======================
// 📦 送出訂單（穩定版）
// ======================
document.getElementById("sendBtn").addEventListener("click", sendOrder);

function sendOrder(){

  const now = new Date();

  const time =
    now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "+
    now.getHours()+":"+now.getMinutes()+":"+now.getSeconds();

  let order = [];

  document.querySelectorAll("#cart .box").forEach(box=>{

    const type = box.querySelector(".type").value;
    const sub = box.querySelector(".sub");

    if(!type || !sub.innerHTML) return;

    if(type === "ice"){
      order.push({
        type:"冰淇淋",
        item: box.querySelector(".ice").value,
        topping: box.querySelector(".top").value,
        qty: box.querySelector(".qty").value
      });
    }

    if(type === "taiyaki"){
      order.push({
        type:"鯛魚燒",
        item: box.querySelector(".food").value,
        qty: box.querySelector(".qty").value
      });
    }

    if(type === "waffle"){
      order.push({
        type:"鬆餅",
        item: box.querySelector(".food").value,
        qty: box.querySelector(".qty").value
      });
    }
  });

  if(order.length === 0){
    alert("請先點餐！");
    return;
  }

  db.ref("orders").push({
    items: order,
    time: time,
    done: false
  });

  alert("送出成功！");

  document.getElementById("cart").innerHTML = "";
  items = [];
}


// ======================
// 📡 內場
// ======================
db.ref("orders").on("value", snap=>{

  const data = snap.val() || {};
  let html = "";

  for(let id in data){

    const o = data[id];

    let list = "";
    o.items.forEach(i=>{
      list += `${i.type} ${i.item} x${i.qty}<br>`;
    });

    html += `
      <div class="box">
        ⏰ ${o.time}<br>
        ${list}

        <button onclick="done('${id}')">
          ${o.done ? "✔完成" : "完成"}
        </button>

        <button class="red" onclick="del('${id}')">
          刪除
        </button>
      </div>
    `;
  }

  document.getElementById("orders").innerHTML = html;
});

function done(id){
  db.ref("orders/"+id).update({done:true});
}

function del(id){
  if(confirm("刪除？")){
    db.ref("orders/"+id).remove();
  }
}

show();

</script>

</body>
</html>
